services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brainapi-api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-brainapi}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: brainapi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brainapi}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - brainapi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: brainapi-redis
    ports:
      - "6379:6379"
    volumes:
      - brainapi_redis_data:/data
    restart: unless-stopped

volumes:
  brainapi_postgres_data:
  brainapi_redis_data:
