<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - BrainAPI</title>
  <meta name="description" content="Create your BrainAPI account and start building with unified AI APIs." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/ui/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/ui/brainapi-ui.css">
  <style>
    :root {
      --bg: #070709;
      --bg-card: #0f0f12;
      --bg-hover: #141418;
      --border: rgba(255,255,255,0.07);
      --border-md: rgba(255,255,255,0.12);
      --text: #ededed;
      --muted: #888;
      --brand: #00c896;
      --brand-dim: rgba(0,200,150,0.12);
      --error: #ff6b6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .auth-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .auth-logo {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--brand), #00a06f);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-dim);
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    .form-error {
      color: var(--error);
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .form-error.show {
      display: block;
    }

    .password-strength {
      font-size: 12px;
      margin-top: 4px;
      padding: 6px 8px;
      border-radius: 4px;
      background: var(--bg);
      color: var(--muted);
    }

    .password-strength.weak {
      color: var(--error);
    }

    .password-strength.fair {
      color: #ffa940;
    }

    .password-strength.good {
      color: var(--brand);
    }

    .btn {
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--brand);
      color: var(--bg);
      margin-top: 16px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #00a06f;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 200, 150, 0.2);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 16px 0;
      font-size: 13px;
      line-height: 1.4;
    }

    .form-checkbox input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .form-checkbox label {
      cursor: pointer;
    }

    .form-checkbox a {
      color: var(--brand);
      text-decoration: none;
    }

    .form-checkbox a:hover {
      text-decoration: underline;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: rgba(255, 107, 107, 0.1);
      color: var(--error);
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .alert-success {
      background: rgba(0, 200, 150, 0.1);
      color: var(--brand);
      border: 1px solid rgba(0, 200, 150, 0.3);
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--brand);
      font-size: 12px;
      margin-top: 8px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid var(--brand-dim);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 4px;
      vertical-align: -1px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .auth-card {
        padding: 24px;
      }
      
      .auth-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">BrainAPI</div>
        <h1 class="auth-title">Get Started</h1>
        <p class="auth-subtitle">Create your free account in seconds</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName" 
            class="form-input" 
            placeholder="John Doe"
            required
          />
          <div class="form-error" id="fullNameError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="you@brainapi.site"
            required
          />
          <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="At least 8 characters"
            required
            minlength="8"
            onkeyup="checkPasswordStrength()"
          />
          <div id="passwordStrength" class="password-strength"></div>
          <div class="form-error" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            class="form-input" 
            placeholder="Re-enter your password"
            required
            minlength="8"
          />
          <div class="form-error" id="confirmPasswordError"></div>
        </div>

        <div class="form-checkbox">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">
            I agree to the <a href="/ui/terms.html" target="_blank">Terms of Service</a> and 
            <a href="/ui/privacy.html" target="_blank">Privacy Policy</a>
          </label>
        </div>
        <div class="form-error" id="termsError"></div>

        <div class="form-checkbox">
          <input type="checkbox" id="newsletter" name="newsletter">
          <label for="newsletter">
            Send me updates about new features and improvements
          </label>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          Create Account
        </button>

        <div class="loading" id="loadingIndicator">
          <span class="spinner"></span>Creating account...
        </div>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/ui/login.html">Sign in</a>
      </div>

      <div class="auth-footer" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">
        <p>30-day free trial • No credit card required</p>
      </div>
    </div>
  </div>

  <script src="/ui/auth.js"></script>
  <script>
    function checkPasswordStrength() {
      const password = document.getElementById('password').value;
      const strengthEl = document.getElementById('passwordStrength');

      if (!password) {
        strengthEl.textContent = '';
        return;
      }

      let strength = 0;
      
      // Check length
      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      
      // Check for uppercase
      if (/[A-Z]/.test(password)) strength++;
      
      // Check for numbers
      if (/[0-9]/.test(password)) strength++;
      
      // Check for special characters
      if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;

      if (strength <= 2) {
        strengthEl.textContent = '⚠ Weak password';
        strengthEl.className = 'password-strength weak';
      } else if (strength <= 3) {
        strengthEl.textContent = '◐ Fair password';
        strengthEl.className = 'password-strength fair';
      } else {
        strengthEl.textContent = '✓ Strong password';
        strengthEl.className = 'password-strength good';
      }
    }

    async function handleSignup(event) {
      event.preventDefault();
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;
      const newsletter = document.getElementById('newsletter').checked;
      const submitBtn = document.getElementById('submitBtn');
      const loadingIndicator = document.getElementById('loadingIndicator');

      // Clear previous errors
      clearErrors();
      clearAlert();

      // Validate inputs
      if (!fullName) {
        showError('fullNameError', 'Full name is required');
        return;
      }

      if (!email) {
        showError('emailError', 'Email is required');
        return;
      }

      if (!isValidEmail(email)) {
        showError('emailError', 'Please enter a valid email address');
        return;
      }

      if (!password) {
        showError('passwordError', 'Password is required');
        return;
      }

      if (password.length < 8) {
        showError('passwordError', 'Password must be at least 8 characters');
        return;
      }

      if (password !== confirmPassword) {
        showError('confirmPasswordError', 'Passwords do not match');
        return;
      }

      if (!terms) {
        showError('termsError', 'You must accept the terms and privacy policy');
        return;
      }

      // Show loading state
      submitBtn.disabled = true;
      loadingIndicator.classList.add('show');

      try {
        const response = await BrainAPIAuth.postJson('/api/v1/auth/signup', {
          name: fullName,
          email,
          password,
          newsletter_opt_in: newsletter,
        });

        if (response.success) {
          BrainAPIAuth.storeToken(response.token, {
            rememberMe: true,
            user: response.user,
          });

          if (response.api_key) {
            localStorage.setItem('brainapi_user_api_key', response.api_key);
            sessionStorage.setItem('brainapi_user_api_key', response.api_key);
          }

          showAlert('✓ Account created! Redirecting to dashboard...', 'success');
          
          setTimeout(() => {
            window.location.href = '/ui/dashboard.html#overview';
          }, 1000);
        } else {
          showAlert('Signup failed. Please try again.', 'error');
        }
      } catch (error) {
        showAlert(error.message || 'An error occurred. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        loadingIndicator.classList.remove('show');
      }
    }

    function isValidEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }

    function showError(fieldId, message) {
      const errorEl = document.getElementById(fieldId);
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
      }
    }

    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });
    }

    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = message;
      alertBox.className = 'alert show alert-' + type;
    }

    function clearAlert() {
      const alertBox = document.getElementById('alertBox');
      alertBox.className = 'alert';
      alertBox.textContent = '';
    }

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = BrainAPIAuth.getToken();
      if (token) {
        window.location.href = '/ui/dashboard.html#overview';
      }
    });
  </script>
</body>
</html>
