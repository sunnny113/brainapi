<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - BrainAPI</title>
  <meta name="description" content="Log in to your BrainAPI account to manage API keys, billing, and usage." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/ui/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/ui/brainapi-ui.css">
  <style>
    :root {
      --bg: #070709;
      --bg-card: #0f0f12;
      --bg-hover: #141418;
      --border: rgba(255,255,255,0.07);
      --border-md: rgba(255,255,255,0.12);
      --text: #ededed;
      --muted: #888;
      --brand: #00c896;
      --brand-dim: rgba(0,200,150,0.12);
      --error: #ff6b6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .auth-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .auth-logo {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--brand), #00a06f);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-dim);
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    .form-error {
      color: var(--error);
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .form-error.show {
      display: block;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: var(--brand);
      color: var(--bg);
      margin-top: 24px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #00a06f;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 200, 150, 0.2);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 13px;
    }

    .form-link {
      color: var(--brand);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .form-link:hover {
      color: #00a06f;
      text-decoration: underline;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
      position: relative;
    }

    .divider-text {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-card);
      padding: 0 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: rgba(255, 107, 107, 0.1);
      color: var(--error);
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .alert-success {
      background: rgba(0, 200, 150, 0.1);
      color: var(--brand);
      border: 1px solid rgba(0, 200, 150, 0.3);
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--brand);
      font-size: 13px;
      margin-top: 12px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--brand-dim);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: -1px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .auth-card {
        padding: 24px;
      }
      
      .auth-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">BrainAPI</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your account to continue</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="you@brainapi.site"
            required
          />
          <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
            minlength="8"
          />
          <div class="form-error" id="passwordError"></div>
        </div>

        <div class="form-links">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0;">
            <input type="checkbox" id="rememberMe" name="rememberMe" checked style="width: 16px; height: 16px; cursor: pointer;">
            <span>Remember me</span>
          </label>
          <a href="/ui/forgot-password.html" class="form-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          Sign In
        </button>

        <div class="loading" id="loadingIndicator">
          <span class="spinner"></span>Signing in...
        </div>
      </form>

      <div class="divider">
        <span class="divider-text">New to BrainAPI?</span>
      </div>

      <div class="auth-footer">
        <a href="/ui/signup.html">Create an account</a>
      </div>

      <div class="auth-footer" style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px;">
        <p>Don't have an API key yet? <a href="/">Get started free</a></p>
      </div>
    </div>
  </div>

  <script src="/ui/auth.js"></script>
  <script>
    function showSessionNotice() {
      const params = new URLSearchParams(window.location.search);
      const reason = params.get('reason');

      if (reason === 'session-reset') {
        showAlert('Your previous session is no longer valid on this deployment. Please sign in again.', 'error');
      } else if (reason === 'session-expired') {
        showAlert('Your session expired. Please sign in again.', 'error');
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const submitBtn = document.getElementById('submitBtn');
      const loadingIndicator = document.getElementById('loadingIndicator');
      // Clear previous errors
      clearErrors();
      clearAlert();

      // Validate inputs
      if (!email) {
        showError('emailError', 'Email is required');
        return;
      }

      if (!isValidEmail(email)) {
        showError('emailError', 'Please enter a valid email address');
        return;
      }

      if (!password) {
        showError('passwordError', 'Password is required');
        return;
      }

      if (password.length < 8) {
        showError('passwordError', 'Password must be at least 8 characters');
        return;
      }

      // Show loading state
      submitBtn.disabled = true;
      loadingIndicator.classList.add('show');

      try {
        const response = await BrainAPIAuth.postJson('/api/v1/auth/login', {
          email,
          password,
        });

        if (response.success) {
          BrainAPIAuth.storeToken(response.token, {
            rememberMe,
            user: response.user,
          });

          showAlert('Login successful! Redirecting...', 'success');
          
          setTimeout(() => {
            window.location.href = '/ui/dashboard.html#overview';
          }, 1000);
        } else {
          showAlert('Login failed. Please check your credentials.', 'error');
        }
      } catch (error) {
        showAlert(error.message || 'An error occurred. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        loadingIndicator.classList.remove('show');
      }
    }

    function isValidEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }

    function showError(fieldId, message) {
      const errorEl = document.getElementById(fieldId);
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
      }
    }

    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });
    }

    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = message;
      alertBox.className = 'alert show alert-' + type;
    }

    function clearAlert() {
      const alertBox = document.getElementById('alertBox');
      alertBox.className = 'alert';
      alertBox.textContent = '';
    }

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = BrainAPIAuth.getToken();
      if (token) {
        window.location.href = '/ui/dashboard.html#overview';
      }
    });

    showSessionNotice();
  </script>
</body>
</html>
