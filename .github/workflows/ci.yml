name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  api-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit and API tests
        env:
          PROVIDER: mock
          REQUIRE_API_KEY: "true"
          API_KEYS: test-user-key
          ADMIN_API_KEY: test-admin-key
          DATABASE_URL: sqlite:///./test_brainapi.db
          REDIS_URL: ""
          ENABLE_USAGE_METERING: "true"
          AUTO_CREATE_TABLES: "true"
          AUTOMATION_ALLOWED_HOSTS: httpbin.org
          ALLOW_PRIVATE_WEBHOOK_TARGETS: "false"
        run: |
          pytest -q

      - name: Start API (mock mode)
        env:
          PROVIDER: mock
          REQUIRE_API_KEY: "true"
          API_KEYS: ci-user-key
          ADMIN_API_KEY: ci-admin-key
          DATABASE_URL: sqlite:///./brainapi.db
          REDIS_URL: ""
          ENABLE_USAGE_METERING: "true"
          AUTO_CREATE_TABLES: "true"
          AUTOMATION_ALLOWED_HOSTS: httpbin.org
          ALLOW_PRIVATE_WEBHOOK_TARGETS: "false"
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &

      - name: Wait for health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          cat uvicorn.log || true
          exit 1

      - name: Run endpoint smoke checks
        run: |
          python - <<'PY'
          import os
          import tempfile
          import wave

          import httpx

          base_url = "http://127.0.0.1:8000"
          user_key = "ci-user-key"
          admin_key = "ci-admin-key"

          results = []

          def check(name: str, condition: bool, detail: str) -> None:
              results.append((name, condition, detail))
              print(("PASS" if condition else "FAIL"), "|", name, "|", detail)

          with httpx.Client(timeout=25.0) as client:
              r = client.get(f"{base_url}/health")
              check("GET /health", r.status_code == 200, f"HTTP {r.status_code}")
              r.raise_for_status()

              user_headers = {"X-API-Key": user_key}
              admin_headers = {"X-Admin-Key": admin_key}

              r = client.post(
                  f"{base_url}/api/v1/text/generate",
                  headers=user_headers,
                  json={"prompt": "ci smoke", "temperature": 0.2, "max_output_tokens": 25},
              )
              check("POST /api/v1/text/generate", r.status_code == 200, f"HTTP {r.status_code}")

              r = client.post(
                  f"{base_url}/api/v1/image/generate",
                  headers=user_headers,
                  json={"prompt": "ci image", "size": "1024x1024"},
              )
              check("POST /api/v1/image/generate", r.status_code == 200, f"HTTP {r.status_code}")

              with tempfile.NamedTemporaryFile(suffix=".wav", delete=False) as tmp:
                  wav_path = tmp.name
              try:
                  with wave.open(wav_path, "wb") as wf:
                      wf.setnchannels(1)
                      wf.setsampwidth(2)
                      wf.setframerate(8000)
                      wf.writeframes(b"\x00\x00" * 80)

                  with open(wav_path, "rb") as f:
                      r = client.post(
                          f"{base_url}/api/v1/speech/transcribe",
                          headers=user_headers,
                          files={"file": ("ci.wav", f, "audio/wav")},
                      )
                  check("POST /api/v1/speech/transcribe", r.status_code == 200, f"HTTP {r.status_code}")
              finally:
                  try:
                      os.remove(wav_path)
                  except OSError:
                      pass

              r = client.post(
                  f"{base_url}/api/v1/automation/run",
                  headers=user_headers,
                  json={
                      "name": "ci-automation",
                      "steps": [
                          {
                              "type": "webhook",
                              "url": "https://httpbin.org/post",
                              "method": "POST",
                              "headers": {"Content-Type": "application/json"},
                              "body": {"source": "ci"},
                          },
                          {"type": "delay", "seconds": 0.1},
                      ],
                  },
              )
              check("POST /api/v1/automation/run", r.status_code == 200, f"HTTP {r.status_code}")

              r = client.post(
                  f"{base_url}/api/v1/admin/api-keys",
                  headers=admin_headers,
                  json={"name": "ci-key", "rate_limit_per_minute": 20},
              )
              check("POST /api/v1/admin/api-keys", r.status_code == 200, f"HTTP {r.status_code}")
              key_id = r.json().get("id") if r.status_code == 200 else None

              r = client.get(f"{base_url}/api/v1/admin/api-keys", headers=admin_headers)
              check("GET /api/v1/admin/api-keys", r.status_code == 200, f"HTTP {r.status_code}")

              if key_id:
                  r = client.delete(f"{base_url}/api/v1/admin/api-keys/{key_id}", headers=admin_headers)
                  check("DELETE /api/v1/admin/api-keys/{key_id}", r.status_code == 200, f"HTTP {r.status_code}")
              else:
                  check("DELETE /api/v1/admin/api-keys/{key_id}", False, "Skipped: key creation failed")

              r = client.get(f"{base_url}/api/v1/admin/usage", params={"hours": 1}, headers=admin_headers)
              check("GET /api/v1/admin/usage", r.status_code == 200, f"HTTP {r.status_code}")

          failed = sum(1 for _, ok, _ in results if not ok)
          print(f"SUMMARY | {len(results)-failed}/{len(results)} passed, {failed} failed")
          if failed:
              raise SystemExit(1)
          PY

      - name: Print API logs on failure
        if: failure()
        run: |
          echo "==== uvicorn.log ===="
          cat uvicorn.log || true
